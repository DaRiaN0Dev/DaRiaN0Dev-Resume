name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # Disable Husky in CI
      - name: Disable Husky
        run: |
          npm pkg set scripts.prepare=""
          rm -rf .husky

      - name: Install dependencies
        run: npm install

      - name: Run Lint (optional)
        run: npm run lint || true

      - name: Run Spell Check (optional)
        run: npm run spell || true

      - name: Build the Project
        run: npm run build
